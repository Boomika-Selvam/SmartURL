<main class="auth-page">
  <section class="auth-card card">
    <div class="auth-copy">
      <p class="eyebrow">Welcome back</p>
      <h1>Shorten smarter, share cleaner.</h1>
      <p>Sign in to create memorable short links and keep every URL organized in one place.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" class="auth-form">
      <label class="label" for="email">Email</label>
      <input id="email" class="field" type="email" formControlName="email" placeholder="you@example.com">

      <label class="label" for="password">Password</label>
      <input id="password" class="field" type="password" formControlName="password" placeholder="Your password">

      <button class="button" type="submit" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Login' }}
      </button>

      <div class="divider"><span>or</span></div>
      <div id="googleLoginButton" class="google-button"></div>

      <p class="message" *ngIf="message">{{ message }}</p>
      <p class="switch">New to SmartURL? <a routerLink="/register">Create an account</a></p>
    </form>
  </section>
</main>
